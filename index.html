<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود و ثبت‌نام | دوغ بت</title>
    <style>
        :root {
            --primary: #ffc107;
            --primary-hover: #e0a800;
            --bg: #0a0c16;
            --card-bg: #131722;
            --text: #ffffff;
            --input-bg: #1c2030;
            --border: #2d3248;
        }
body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
.auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
h2 {
            text-align: center;
            color: var(--primary);
            margin-bottom: 25px;
        }
.tab-buttons {
            display: flex;
            margin-bottom: 20px;
            gap: 10px;
        }
.tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: 1px solid var(--border);
            color: #aaa;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }
.tab-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }
.form-group {
            margin-bottom: 20px;
        }
label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }
input {
            width: 100%;
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
input:focus {
            outline: none;
            border-color: var(--primary);
        }
.btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            border: none;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
.btn-submit:hover {
            background: var(--primary-hover);
        }
.message {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }
        .error { color: #dc3545; }
        .success { color: #28a745; }
    </style>
</head>
<body>
<div class="auth-container">
    <h2 id="form-title">ورود به دوغ بت 🚀</h2>
<div class="tab-buttons">
        <button class="tab-btn active" onclick="switchTab('login')">ورود</button>
        <button class="tab-btn" onclick="switchTab('register')">ثبت‌نام جدید</button>
    </div>
<!-- فرم ورود و ثبت نام مشترک -->
    <form id="auth-form" onsubmit="handleSubmit(event)">
        <div class="form-group">
            <label>نام کاربری</label>
            <input type="text" id="username" required placeholder="نام کاربری خود را وارد کنید">
        </div>
        <div class="form-group">
            <label>رمز عبور</label>
            <input type="password" id="password" required placeholder="رمز عبور خود را وارد کنید">
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">ورود به حساب</button>
    </form>
<div class="message" id="msg"></div>
</div>
<script>
    let mode = 'login';
// سوئیچ بین تب ورود و ثبت نام
    function switchTab(tab) {
        mode = tab;
        const btnLogin = document.querySelectorAll('.tab-btn')[0];
        const btnRegister = document.querySelectorAll('.tab-btn')[1];
        const submitBtn = document.getElementById('submit-btn');
        const formTitle = document.getElementById('form-title');
        document.getElementById('msg').innerText = '';
if (tab === 'login') {
            btnLogin.classList.add('active');
            btnRegister.classList.remove('active');
            submitBtn.innerText = "ورود به حساب";
            formTitle.innerText = "ورود به دوغ بت 🚀";
        } else {
            btnRegister.classList.add('active');
            btnLogin.classList.remove('active');
            submitBtn.innerText = "ساخت حساب کاربری";
            formTitle.innerText = "عضویت در دوغ بت ✨";
        }
    }
// مدیریت ارسال فرم
    function handleSubmit(event) {
        event.preventDefault();
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const msg = document.getElementById('msg');
// دریافت کاربران از localStorage یا ساخت آرایه خالی
        let users = JSON.parse(localStorage.getItem('users')) || [];
if (mode === 'register') {
            // بررسی تکراری نبودن نام کاربری
            const userExists = users.find(u => u.username.toLowerCase() === user.toLowerCase());
            if (userExists) {
                msg.className = "message error";
                msg.innerText = "این نام کاربری قبلاً ثبت شده است!";
                return;
            }
// ثبت کاربر جدید با موجودی اولیه ۰ سکه دوغی
            users.push({ username: user, password: pass, balance: 0 });
            localStorage.setItem('users', JSON.stringify(users));
            msg.className = "message success";
            msg.innerText = "ثبت‌نام با موفقیت انجام شد! حالا وارد شوید.";
            switchTab('login');
        } else {
            // ورود به حساب
            const foundUser = users.find(u => u.username.toLowerCase() === user.toLowerCase() && u.password === pass);
            if (foundUser) {
                // ذخیره کاربر فعلی در سشن مرورگر
                localStorage.setItem('currentUser', foundUser.username);
                msg.className = "message success";
                msg.innerText = "ورود موفقیت‌آمیز بود! انتقال به بازی...";
                setTimeout(() => {
                    window.location.href = 'game.html';
                }, 1000);
            } else {
                msg.className = "message error";
                msg.innerText = "نام کاربری یا رمز عبور اشتباه است!";
            }
        }
    }
</script>
</body>
</html>
