<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بازی انفجار | دوغ بت</title>
    <style>
        :root {
            --primary: #ffc107;
            --bg-dark: #131722;
            --card-bg: #1c2030;
            --success: #28a745;
            --danger: #dc3545;
            --text: #ffffff;
        }
body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
.header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            background: var(--card-bg);
            padding: 15px 20px;
            border-radius: 10px;
            box-sizing: border-box;
        }
.user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
.balance-box {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            color: var(--primary);
        }
.btn-logout {
            background: var(--danger);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
.game-container {
            width: 100%;
            max-width: 900px;
            background: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 2fr;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
@media (max-width: 768px) {
            .game-container { grid-template-columns: 1fr; }
        }
.control-panel {
            padding: 20px;
            border-left: 1px solid #2d3248;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 15px;
        }
.input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
.input-group label {
            font-size: 14px;
            color: #ccc;
        }
.input-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #3d4361;
            background: #131722;
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }
.btn-action {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
.btn-bet { background-color: var(--success); color: white; }
        .btn-cashout { background-color: var(--primary); color: #000; }
        .btn-disabled { background-color: #555; cursor: not-allowed; color: #ccc; }
.chart-area {
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            background: #0f111a;
            min-height: 350px;
            justify-content: center;
            align-items: center;
        }
.multiplier-display {
            font-size: 64px;
            font-weight: bold;
            z-index: 10;
        }
.crashed-text { color: var(--danger); }
.history-container {
            width: 100%;
            max-width: 900px;
            padding: 10px;
            background: #171b2a;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            border-radius: 10px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }
.history-badge {
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-high { background: rgba(40, 167, 69, 0.2); color: #28a745; }
        .badge-low { background: rgba(220, 53, 69, 0.2); color: #dc3545; }
    </style>
</head>
<body>
<div class="header">
    <div class="user-info">
        <span id="username-display" style="font-weight: bold;">کاربر: مهمان</span>
        <div class="balance-box" id="balance-display">۰ سکه دوغی</div>
    </div>
    <div style="display: flex; gap: 10px;">
        <a href="admin.html" style="background:#171b2a; color:#fff; padding:8px 15px; border-radius:5px; text-decoration:none; font-weight:bold; font-size:14px; border:1px solid #3d4361;">پنل ادمین ⚙️</a>
        <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
</div>
<div class="history-container" id="history"></div>
<div class="game-container">
    <div class="control-panel">
        <div class="input-group">
            <label>مبلغ شرط (سکه دوغی)</label>
            <input type="number" id="bet-amount" value="10" min="1">
        </div>
        <div class="input-group">
            <label>برداشت خودکار روی ضریب</label>
            <input type="number" id="auto-cashout" value="2.00" step="0.1" min="1.01">
        </div>
        <button class="btn-action btn-bet" id="btn-main" onclick="handleButtonClick()">ثبت شرط</button>
    </div>
<div class="chart-area">
        <div class="multiplier-display" id="multiplier-text">1.00x</div>
        <div id="game-status" style="position: absolute; top: 20px; color: #888;">آماده برای شروع...</div>
    </div>
</div>
<script>
    let users = JSON.parse(localStorage.getItem('users')) || [];
    let currentUser = localStorage.getItem('currentUser');
    let userObj = users.find(u => u.username === currentUser);
// بررسی لاگین بودن کاربر
    if (!currentUser || !userObj) {
        alert("لطفا ابتدا وارد حساب خود شوید!");
        window.location.href = "index.html";
    }
document.getElementById("username-display").innerText = `کاربر: ${userObj.username}`;
    updateBalanceDisplay();
let currentMultiplier = 1.00;
    let crashPoint = 0;
    let gameInterval;
    let gameState = "idle"; // idle, running, crashed
    let currentBet = 0;
    let hasBet = false;
    let hasCashedOut = false;
function updateBalanceDisplay() {
        document.getElementById("balance-display").innerText = `${userObj.balance.toLocaleString()} سکه دوغی`;
    }
function saveUsers() {
        localStorage.setItem('users', JSON.stringify(users));
    }
function handleButtonClick() {
        if (gameState === "idle") {
            startBet();
        } else if (gameState === "running" && hasBet && !hasCashedOut) {
            cashOut();
        }
    }
function startBet() {
        const betValue = parseInt(document.getElementById("bet-amount").value);
        if (isNaN(betValue) || betValue <= 0 || betValue > userObj.balance) {
            alert("موجودی ناکافی یا مبلغ نامعتبر است!");
            return;
        }
userObj.balance -= betValue;
        currentBet = betValue;
        hasBet = true;
        hasCashedOut = false;
        saveUsers();
        updateBalanceDisplay();
document.getElementById("btn-main").innerText = "برداشت";
        document.getElementById("btn-main").className = "btn-action btn-cashout";
runGame();
    }
function runGame() {
        gameState = "running";
        currentMultiplier = 1.00;
        document.getElementById("multiplier-text").classList.remove("crashed-text");
        document.getElementById("game-status").innerText = "نمودار در حال رشد...";
// فرمول تعیین ضریب تصادفی انفجار
        const rand = Math.random();
        if (rand < 0.08) {
            crashPoint = 1.00; // ۸ درصد احتمال باخت در همان شروع
        } else {
            crashPoint = parseFloat((100 / (100 - Math.random() * 95)).toFixed(2));
        }
gameInterval = setInterval(() => {
            currentMultiplier += 0.01 + (currentMultiplier * 0.005); // شتاب نمودار
            document.getElementById("multiplier-text").innerText = currentMultiplier.toFixed(2) + "x";
// بررسی برداشت خودکار
            const autoVal = parseFloat(document.getElementById("auto-cashout").value);
            if (hasBet && !hasCashedOut && autoVal && currentMultiplier >= autoVal && autoVal < crashPoint) {
                cashOut();
            }
// سقوط نمودار (Crashed)
            if (currentMultiplier >= crashPoint) {
                clearInterval(gameInterval);
                gameState = "crashed";
                document.getElementById("multiplier-text").innerText = "منفجر شد! " + crashPoint.toFixed(2) + "x";
                document.getElementById("multiplier-text").classList.add("crashed-text");
                document.getElementById("game-status").innerText = "باختید!";
addHistory(crashPoint);
                resetGame();
            }
        }, 100);
    }
function cashOut() {
        if (hasCashedOut) return;
        hasCashedOut = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        userObj.balance += winAmount;
        saveUsers();
        updateBalanceDisplay();
        document.getElementById("game-status").innerText = `شما برنده شدید! +${winAmount} سکه`;
        document.getElementById("btn-main").innerText = "برداشت شد";
        document.getElementById("btn-main").className = "btn-action btn-disabled";
    }
function resetGame() {
        hasBet = false;
        setTimeout(() => {
            document.getElementById("btn-main").innerText = "ثبت شرط";
            document.getElementById("btn-main").className = "btn-action btn-bet";
            document.getElementById("game-status").innerText = "آماده برای شروع...";
            gameState = "idle";
        }, 3000);
    }
function addHistory(point) {
        const historyContainer = document.getElementById("history");
        const badge = document.createElement("span");
        badge.className = `history-badge ${point >= 2 ? 'badge-high' : 'badge-low'}`;
        badge.innerText = point.toFixed(2) + "x";
        historyContainer.prepend(badge);
    }
function logout() {
        localStorage.removeItem('currentUser');
        window.location.href = "index.html";
    }
</script>
</body>
</html>
