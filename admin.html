<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل مدیریت | دوغ بت</title>
    <style>
        :root {
            --primary: #ffc107;
            --bg-dark: #0a0c16;
            --card-bg: #131722;
            --success: #28a745;
            --danger: #dc3545;
            --text: #ffffff;
            --border: #2d3248;
        }
body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
.admin-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid var(--border);
        }
.header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }
h2 {
            margin: 0;
            color: var(--primary);
        }
.btn-back {
            background: #1c2030;
            color: #fff;
            padding: 8px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            border: 1px solid var(--border);
        }
.grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 25px;
        }
@media (max-width: 768px) {
            .grid { grid-template-columns: 1fr; }
        }
/* فرم مدیریت */
        .form-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
.form-group {
            margin-bottom: 15px;
        }
label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #ccc;
        }
select, input {
            width: 100%;
            padding: 12px;
            background: #1c2030;
            border: 1px solid var(--border);
            color: #fff;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }
select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
        }
.btn-add {
            width: 100%;
            padding: 12px;
            background: var(--success);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
.btn-add:hover {
            opacity: 0.9;
        }
/* جدول کاربران */
        .user-list-section {
            background: rgba(255, 255, 255, 0.02);
            padding: 20px;
            border-radius: 10px;
            border: 1px solid var(--border);
            max-height: 400px;
            overflow-y: auto;
        }
table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
th, td {
            padding: 12px;
            border-bottom: 1px solid var(--border);
        }
th {
            color: var(--primary);
            font-size: 14px;
        }
.badge-coins {
            background: rgba(255, 193, 7, 0.1);
            color: var(--primary);
            padding: 3px 8px;
            border-radius: 5px;
            font-size: 13px;
            font-weight: bold;
        }
.no-users {
            text-align: center;
            color: #888;
            padding: 20px;
        }
    </style>
</head>
<body>
<div class="admin-container">
    <div class="header">
        <h2>⚙️ پنل مدیریت دوغ بت (تست و دمو)</h2>
        <a href="game.html" class="btn-back">برگشت به بازی 🎮</a>
    </div>
<div class="grid">
        <!-- بخش شارژ حساب -->
        <div class="form-section">
            <h3 style="margin-top: 0; color: var(--primary);">💰 شارژ/کسر سکه کاربران</h3>
            <form id="admin-form" onsubmit="handleCoinAction(event)">
                <div class="form-group">
                    <label>انتخاب کاربر</label>
                    <select id="user-select" required>
                        <option value="">-- یک کاربر را انتخاب کنید --</option>
                    </select>
                </div>
<div class="form-group">
                    <label>مقدار سکه دوغی (مثبت برای اضافه کردن، منفی برای کم کردن)</label>
                    <input type="number" id="coin-amount" placeholder="مثال: 50000" required>
                </div>
<button type="submit" class="btn-add">اعمال تغییرات موجودی</button>
            </form>
            <p style="font-size: 12px; color: #888; margin-top: 15px; line-height: 1.6;">
                * راهنما: برای اضافه کردن سکه عدد مثبت (مثلا 1000) و برای کسر کردن عدد منفی (مثلا 500-) وارد کنید.
            </p>
        </div>
<!-- بخش لیست کاربران -->
        <div class="user-list-section">
            <h3 style="margin-top: 0; color: var(--primary);">👥 لیست تمام کاربران</h3>
            <table>
                <thead>
                    <tr>
                        <th>نام کاربری</th>
                        <th>موجودی فعلی</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- لیست کاربران اینجا لود می‌شود -->
                </tbody>
            </table>
            <div id="no-users-msg" class="no-users" style="display: none;">هیچ کاربری ثبت‌نام نکرده است.</div>
        </div>
    </div>
</div>
<script>
    // دریافت لیست کاربران از localStorage
    let users = JSON.parse(localStorage.getItem('users')) || [];
// لود کردن لیست کاربران در جدول و منوی کشویی
    function loadUsersData() {
        const tableBody = document.getElementById("user-table-body");
        const selectDropdown = document.getElementById("user-select");
        const noUsersMsg = document.getElementById("no-users-msg");
// خالی کردن مقادیر قبلی
        tableBody.innerHTML = "";
        selectDropdown.innerHTML = '<option value="">-- یک کاربر را انتخاب کنید --</option>';
if (users.length === 0) {
            noUsersMsg.style.display = "block";
            return;
        } else {
            noUsersMsg.style.display = "none";
        }
users.forEach(user => {
            // اضافه کردن به جدول
            const row = document.createElement("tr");
            row.innerHTML = `
                <td>${user.username}</td>
                <td><span class="badge-coins">${user.balance.toLocaleString()} سکه</span></td>
            `;
            tableBody.appendChild(row);
// اضافه کردن به آپشن‌های سلکتور
            const option = document.createElement("option");
            option.value = user.username;
            option.innerText = user.username;
            selectDropdown.appendChild(option);
        });
    }
// مدیریت ارسال فرم و ویرایش موجودی
    function handleCoinAction(event) {
        event.preventDefault();
        const selectedUsername = document.getElementById("user-select").value;
        const amount = parseInt(document.getElementById("coin-amount").value);
if (!selectedUsername) {
            alert("لطفا ابتدا یک کاربر را انتخاب کنید!");
            return;
        }
if (isNaN(amount)) {
            alert("لطفا یک عدد معتبر وارد کنید!");
            return;
        }
// پیدا کردن کاربر و تغییر موجودی او
        const userObj = users.find(u => u.username === selectedUsername);
        if (userObj) {
            userObj.balance += amount;
// جلوگیری از منفی شدن موجودی کل
            if (userObj.balance < 0) {
                userObj.balance = 0;
            }
// ذخیره در دیتابیس محلی
            localStorage.setItem('users', JSON.stringify(users));
alert(`موجودی کاربر "${selectedUsername}" با موفقیت ویرایش شد.`);
// ریست کردن فیلد مبلغ و ریلود کردن اطلاعات
            document.getElementById("coin-amount").value = "";
            loadUsersData();
        } else {
            alert("کاربر یافت نشد!");
        }
    }
// اجرای اولیه برای نمایش اطلاعات
    loadUsersData();
</script>
</body>
</html>
